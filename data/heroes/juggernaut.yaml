hero:
  name: npc_dota_hero_juggernaut
  base_health: 600
  base_mana: 255
  base_armor: 2
  base_magic_resist: 0.25

abilities:
  - name: juggernaut_blade_fury
    base_class: ability_lua
    script: abilities/juggernaut_blade_fury.lua
    behavior: [NO_TARGET, CHANNELLED]
    target_team: NONE
    cast_point: 0.0
    channel_time: 5.0
    cooldown: [30, 26, 22, 18]
    mana_cost: [110, 110, 110, 110]
    ability_special:
      radius:        [250, 250, 250, 250]
      damage_per_s:  [80, 100, 120, 140]
      tick_interval: [0.2, 0.2, 0.2, 0.2]

  - name: juggernaut_healing_ward
    base_class: ability_lua
    script: abilities/juggernaut_healing_ward.lua
    behavior: [NO_TARGET]
    target_team: NONE
    cast_point: 0.3
    cooldown: [60, 60, 60, 60]
    mana_cost: [100, 120, 140, 160]
    ability_special:
      heal_pct:        [2.0, 3.0, 4.0, 5.0]   # % max HP per second
      duration:        [25, 25, 25, 25]
      tick_interval:   [1.0, 1.0, 1.0, 1.0]

  - name: juggernaut_omnislash
    base_class: ability_lua
    script: abilities/juggernaut_omnislash.lua
    behavior: [UNIT_TARGET]
    target_team: ENEMY
    cast_point: 0.3
    cooldown: [130, 120, 110]
    mana_cost: [200, 275, 350]
    cast_range: 350
    ability_special:
      slashes:         [3, 6, 9]
      damage_per_hit:  [200, 225, 250]
